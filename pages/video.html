<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сергей Бугаев - Библиотека лекций - видео">
    <title>Видео — Сергей Бугаев</title>
    <link rel="icon" href="../images/cropped-logo-yantra_160x160.jpg" type="image/jpg">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="page" data-page="video">
    <header class="app-header page-header">
        <a href="../index.html" class="logo">
            <img src="../images/cropped-logo-yantra_160x160.jpg" alt="Логотип">
            <h1>Сергей Бугаев<br>Библиотека лекций</h1>
        </a>
    </header>

    <main class="page-main">
        <a href="../index.html" class="back-button">← Вернуться к каталогу</a>

        <div id="loading" class="page-status">Загрузка…</div>
        <div id="page-error" class="page-status" style="display: none;"></div>

        <div id="video-container" style="display: none;">
            <div class="page-card">
                <iframe id="video-player" class="video-embed" allowfullscreen
                    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>

            <div id="audio-card" class="page-card" style="display: none;">
                <h3 class="page-subtitle">Аудиозапись</h3>
                <audio id="audio-player" controls preload="none" style="width: 100%;"></audio>
                <div class="page-actions">
                    <a id="audio-download" href="#" download class="btn-action btn-secondary">Скачать MP3</a>
                </div>
            </div>

            <div class="page-card">
                <h1 id="video-title" class="page-title"></h1>
                <div class="page-meta">
                    <span id="video-order"></span>
                    <span id="video-date"></span>
                    <span id="video-duration"></span>
                </div>
                <div id="video-description" class="page-text"></div>
                <div class="page-actions">
                    <a id="video-read-link" href="#" class="btn-action">📖 Читать текст лекции</a>
                    <a id="video-external" href="#" target="_blank" rel="noopener" class="btn-action btn-secondary">
                        Открыть на YouTube ↗
                    </a>
                </div>
            </div>
        </div>

            <nav id="lecture-nav" class="lecture-nav" style="display: none;" aria-label="Соседние лекции">
                <a id="nav-prev" href="#" class="nav-link nav-prev">
                    <span class="nav-dir">← Предыдущая</span>
                    <span class="nav-title"></span>
                </a>
                <a id="nav-next" href="#" class="nav-link nav-next">
                    <span class="nav-dir">Следующая →</span>
                    <span class="nav-title"></span>
                </a>
            </nav>
    </main>

    <footer class="page-footer">
        <p>&copy; 2025 Личная библиотека лекций. Все права защищены.</p>
    </footer>

    <script src="../assets/js/data.js" defer></script>
    <script src="../assets/js/texts-index.js" defer></script>
    <script src="../assets/js/page.js" defer></script>
</body>

</html>
