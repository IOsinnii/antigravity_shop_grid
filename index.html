<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сергей Бугаев - Библиотека лекций">
    <meta name="theme-color" content="#121212">
    <!-- Social sharing (site-level; per-lecture og: tags arrive with the SSG phase) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Сергей Бугаев — Библиотека лекций">
    <meta property="og:description"
        content="194 лекции о дзен, медитации и духовном пути: видео, аудио и тексты. 1995 — наши дни.">
    <meta property="og:image" content="images/logo-yantra-180x180.jpg">
    <meta property="og:locale" content="ru_RU">
    <title>Сергей Бугаев - Библиотека лекций</title>
    <link rel="icon" href="images/cropped-logo-yantra_160x160.jpg" type="image/jpg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="app-header">
        <div class="logo">
            <img src="images/cropped-logo-yantra_160x160.jpg" alt="Logo">
            <h1>Сергей Бугаев<br>Библиотека лекций</h1>
        </div>
        <div class="header-controls">
            <div class="control-group">
                <span class="control-label">Тема</span>
                <div class="theme-selector">
                    <button class="theme-btn theme-yantra" data-theme="theme-yantra" title="Янтра"></button>
                    <button class="theme-btn theme-paper" data-theme="theme-paper" title="Бумага"></button>
                    <button class="theme-btn theme-sage" data-theme="theme-sage" title="Мягкий Шалфей"></button>
                    <button class="theme-btn theme-graphite" data-theme="theme-graphite" title="Графит"></button>
                    <button class="theme-btn theme-forest" data-theme="theme-forest" title="Лес"></button>
                    <button class="theme-btn theme-obsidian" data-theme="theme-obsidian" title="Обсидиан"></button>
                </div>
            </div>
            <div class="control-group">
                <span class="control-label">Шрифт</span>
                <div class="font-selector">
                    <button class="view-btn font-btn active" data-font="font-arial">Arial</button>
                    <button class="view-btn font-btn" data-font="font-verdana">Verdana</button>
                </div>
            </div>
            <div class="control-group">
                <span class="control-label">Размер</span>
                <div class="font-size-selector">
                    <button class="size-btn" data-size-step="-1" aria-label="Уменьшить шрифт" title="Мельче">А−</button>
                    <button class="size-btn" data-size-step="0" aria-label="Обычный размер шрифта" title="Обычный">А</button>
                    <button class="size-btn" data-size-step="1" aria-label="Увеличить шрифт" title="Крупнее">А+</button>
                </div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск лекций...">
                <button id="search-clear" class="search-clear" title="Очистить поиск" aria-label="Очистить поиск">&times;</button>
            </div>

            <div class="view-toggles">
                <button class="view-btn active" data-view="table" aria-label="Список">
                    <i class="fas fa-list"></i>
                </button>
                <button class="view-btn" data-view="grid" aria-label="Плитка">
                    <i class="fas fa-th-large"></i>
                </button>
            </div>

            <div class="filters-section">
                <h3>Категории</h3>
                <ul id="category-list">
                    <!-- Categories injected by JS -->
                </ul>
            </div>

            <div class="sidebar-links">
                <h3>Страницы</h3>
                <a href="pages/teacher.html">Учитель</a>
                <a href="pages/middle-path.html">Серединный Путь</a>
                <a href="pages/meditation-centers.html">Центры медитации</a>
            </div>

            <footer class="app-footer">
                <p>&copy; 2025 Личная библиотека лекций. Все права защищены.</p>
            </footer>
        </nav>

        <div class="sidebar-resizer">
            <button id="sidebar-toggle" class="sidebar-toggle" title="Свернуть/Развернуть меню">
                <span>свернуть</span>
            </button>
        </div>

        <main class="content-area">
            <div id="catalog-header">
                <div class="header-left">
                    <h2 id="current-category-title">Все лекции</h2>
                    <span id="lecture-count">0 записей</span>
                </div>
                <div class="sort-controls">
                    <span class="sort-label">Сортировать по:</span>
                    <button class="sort-btn active" data-sort="date" data-order="desc">
                        Дате <i class="fas fa-arrow-down"></i>
                    </button>
                    <button class="sort-btn" data-sort="duration" data-order="desc">
                        Длительности <i class="fas fa-arrow-down"></i>
                    </button>
                </div>
            </div>

            <div id="catalog-container" class="view-table">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>

    <!-- Scripts: deferred so the ~500KB dataset doesn't block first paint -->
    <script src="assets/js/data.js" defer></script>
    <script src="assets/js/texts-index.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>

</html>
